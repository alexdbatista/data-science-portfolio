version: "3.9"

services:
  weed-predictor-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: sugarcane-weed-predictor:latest
    container_name: weed_predictor_api
    ports:
      - "8000:8000"
    volumes:
      # Mount trained model artefacts from host (generated by 03_model_training.py)
      - ./models:/app/models:ro
      - ./data:/app/data:ro
      - ./reports:/app/reports
    environment:
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional: Swagger UI pre-populated with example request
  swagger-ui:
    image: swaggerapi/swagger-ui
    ports:
      - "8080:8080"
    environment:
      - SWAGGER_JSON_URL=http://weed-predictor-api:8000/openapi.json
    depends_on:
      - weed-predictor-api
